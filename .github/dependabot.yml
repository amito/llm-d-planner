version: 2
updates:
  # Python dependencies (main project via uv/pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Python dependencies (UI Dockerfile)
  - package-ecosystem: "pip"
    directory: "/ui"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Python dependencies (simulator Dockerfile)
  - package-ecosystem: "pip"
    directory: "/simulator"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/ui"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/simulator"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
