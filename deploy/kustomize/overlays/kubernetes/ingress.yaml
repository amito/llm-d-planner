apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neuralnav
  namespace: neuralnav
spec:
  rules:
    - host: neuralnav.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 8501
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
