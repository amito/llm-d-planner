apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  template:
    spec:
      containers:
        - name: backend
          volumeMounts:
            - name: service-ca
              mountPath: /etc/pki/service-ca
              readOnly: true
      volumes:
        - name: service-ca
          configMap:
            name: neuralnav-service-ca
            optional: true
