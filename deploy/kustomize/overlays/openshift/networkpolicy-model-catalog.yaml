apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-neuralnav-to-model-catalog
  namespace: rhoai-model-registries
  annotations:
    neuralnav.io/foreign-namespace: rhoai-model-registries
spec:
  podSelector:
    matchLabels:
      app: model-catalog
      app.kubernetes.io/name: model-catalog
      component: model-catalog
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: neuralnav
          podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
      ports:
        - port: 8443
          protocol: TCP
  policyTypes:
    - Ingress
